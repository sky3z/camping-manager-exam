spring.application.name=camping-manager-exam

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:camping_manager_exam}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:camping-manager-chiave-super-segreta-2026-esame-backend}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Admin test iniziale (seed)
app.admin.email=${ADMIN_EMAIL:admin@camping.it}
app.admin.password=${ADMIN_PASSWORD:Admin123!}

# Cloudinary (storage immagini profilo)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Stripe pagamenti
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
app.frontend.url=http://localhost:8080

# OpenWeatherMap
openweather.api.key=${OPENWEATHER_API_KEY:}

server.port=8080